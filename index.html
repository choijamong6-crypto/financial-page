<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Budget Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffecd2 100%);
            min-height: 100vh;
            color: #5a4a42;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Cute Header */
        header {
            text-align: center;
            padding: 30px 0;
            position: relative;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .header-cat {
            width: 180px;
            height: 180px;
            border-radius: 16px;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        header p {
            color: #8b7355;
            margin-top: 5px;
            font-size: 1.1rem;
        }

        /* Month Selector */
        .month-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .month-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: #fff;
            color: #5a4a42;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .month-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .month-btn.active {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #fff;
        }

        /* Info Cards */
        .info-section {
            background: #fff;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .info-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff9a9e, #fecfef, #a18cd1, #fbc2eb);
        }

        .info-section h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #5a4a42;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: linear-gradient(135deg, #fff5f5 0%, #fef5ff 100%);
            border-radius: 15px;
            transition: transform 0.2s;
        }

        .info-item:hover {
            transform: scale(1.02);
        }

        .info-item img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fecfef;
        }

        .info-item .emoji {
            font-size: 40px;
        }

        .info-text h4 {
            font-size: 1rem;
            color: #5a4a42;
            margin-bottom: 3px;
        }

        .info-text p {
            font-size: 0.85rem;
            color: #8b7355;
            line-height: 1.4;
        }

        /* Summary Cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .card.income::after { background: linear-gradient(90deg, #56ab2f, #a8e063); }
        .card.expense::after { background: linear-gradient(90deg, #ff6b6b, #feca57); }
        .card.balance::after { background: linear-gradient(90deg, #667eea, #764ba2); }
        .card.savings::after { background: linear-gradient(90deg, #f093fb, #f5576c); }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .card-icon.income { background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%); }
        .card-icon.expense { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
        .card-icon.balance { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
        .card-icon.savings { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }

        .card h3 {
            color: #8b7355;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .card .amount {
            font-size: 1.8rem;
            font-weight: 800;
            margin-top: 5px;
        }

        .card .amount.positive { color: #56ab2f; }
        .card .amount.negative { color: #ff6b6b; }
        .card .amount.neutral { color: #667eea; }

        .card .sub-text {
            font-size: 0.8rem;
            color: #a89080;
            margin-top: 5px;
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .chart-card {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        .chart-card h2 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #5a4a42;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-container {
            position: relative;
            height: 280px;
        }

        /* Insights */
        .insights-section {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .insights-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #5a4a42;
        }

        .insight-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 18px;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            border-radius: 15px;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }

        .insight-item:hover {
            transform: translateX(5px);
        }

        .insight-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .insight-icon.good { background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%); }
        .insight-icon.warning { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
        .insight-icon.info { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
        .insight-icon.tip { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
        .insight-icon.cat { background: linear-gradient(135deg, #fff1eb 0%, #ace0f9 100%); }

        .insight-content h4 {
            font-size: 0.95rem;
            margin-bottom: 5px;
            color: #5a4a42;
        }

        .insight-content p {
            font-size: 0.85rem;
            color: #8b7355;
            line-height: 1.5;
        }

        /* Expense Table */
        .expense-section {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            overflow-x: auto;
        }

        .expense-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #5a4a42;
        }

        .expense-table {
            width: 100%;
            border-collapse: collapse;
        }

        .expense-table th {
            text-align: left;
            padding: 15px;
            color: #8b7355;
            font-weight: 600;
            border-bottom: 2px solid #ffecd2;
            font-size: 0.9rem;
        }

        .expense-table td {
            padding: 15px;
            border-bottom: 1px solid #fef5f5;
            font-size: 0.9rem;
        }

        .expense-table tr:hover {
            background: #fff9f9;
        }

        .category-badge {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .category-badge.housing { background: #ffe8e8; color: #d63031; }
        .category-badge.utilities { background: #e8f4ff; color: #0984e3; }
        .category-badge.insurance { background: #f3e8ff; color: #6c5ce7; }
        .category-badge.food { background: #e8ffe8; color: #00b894; }
        .category-badge.transport { background: #fff8e8; color: #e17055; }
        .category-badge.giving { background: #ffe8f3; color: #e84393; }
        .category-badge.savings { background: #e8ffff; color: #00cec9; }
        .category-badge.pet { background: #fff0e8; color: #f39c12; }
        .category-badge.entertainment { background: #f8e8ff; color: #9b59b6; }
        .category-badge.other { background: #f0f0f0; color: #636e72; }

        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #ff9a9e, #fecfef);
        }

        /* Savings Goals */
        .savings-section {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .savings-section h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #5a4a42;
        }

        .goal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            background: linear-gradient(135deg, #fff5f5 0%, #fef9ff 100%);
            border-radius: 15px;
            margin-bottom: 12px;
        }

        .goal-info h4 {
            font-size: 0.95rem;
            color: #5a4a42;
            margin-bottom: 3px;
        }

        .goal-info p {
            font-size: 0.8rem;
            color: #a89080;
        }

        .goal-amount {
            text-align: right;
        }

        .goal-amount .target {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f093fb;
        }

        /* Footer Cat */
        .footer-section {
            text-align: center;
            padding: 30px;
        }

        .footer-cats {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .footer-cat {
            width: 150px;
            height: 150px;
            border-radius: 16px;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }

        .footer-cat:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .footer-text {
            color: #8b7355;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8rem;
            }

            .card .amount {
                font-size: 1.5rem;
            }

            .header-cat {
                width: 120px;
                height: 120px;
            }

            .footer-cat {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <img src="01_pictures/놀람.jpg" alt="Namong" class="header-cat">

        <div class="summary-cards" id="summaryCards">

        <div class="charts-grid">

                <h2>Income vs Expenses</h2>

                    <canvas id="trendChart"></canvas>

            <div class="chart-card">

                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>

        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h2>Monthly Breakdown</h2>
                <div class="chart-container">
                    <canvas id="expenseBarChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h2>Savings Goals</h2>
                <div class="chart-container">
                    <canvas id="savingsChart"></canvas>
                </div>
            </div>
        </div>

        <div class="insights-section">
            <h2>Analysis & Insights</h2>
            <div id="insightsContainer">

        <div class="expense-section">

            <table class="expense-table">
                <thead>
                    <tr>
                        <th>Category</th>

                        <th>Amount</th>

                </thead>

        </div>

        <div class="savings-section">
            <h2>Savings Goals</h2>
            <div id="savingsGoalsContainer">

        <div class="footer-section">

                <img src="01_pictures/멋짐.jpg" alt="Cool" class="footer-cat">
                <img src="01_pictures/느긋.jpg" alt="Relaxed" class="footer-cat">
                <img src="01_pictures/놀람.jpg" alt="Surprised" class="footer-cat">
            </div>
            <p class="footer-text">Made with love for our family budget</p>
        </div>
    </div>

    <script>
        // Updated Budget Data from Excel
        const budgetData = {

                },

            },
            nov: {
                income: { salary: 4333.87, total: 4333.87 },

                    housing: { seonhanRent: 1200, sum: 1200 },

        const savingsGoals = [
            { name: "Korean Nurse Cert", nameKo: "한국 간호사", target: "15만원", targetNum: 1500 },
            { name: "Green Card", nameKo: "영주권 (변호사+서류)", target: "$8,000", targetNum: 8000 },
            { name: "Flight Ticket", nameKo: "one-way 비행기", target: "$2,600", targetNum: 2600 },
            { name: "Car Purchase", nameKo: "차", target: "$26,000", targetNum: 26000 }
        ];

        let currentMonth = 'jan';
        let trendChart, categoryChart, expenseBarChart, savingsChart;

        function updateSummaryCards(monthData) {
            const income = monthData.income?.total || 0;
            const expenses = monthData.totalExpenses || 0;
            const balance = income - expenses;
            const savings = monthData.savings?.total || 0;

            const html = `
                <div class="card income">
                    <div class="card-header">
                        <div class="card-icon income">💰</div>
                        <h3>Total Income</h3>
                    </div>
                    <div class="amount positive">$${income.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
                    <div class="sub-text">Chamsae + Hani</div>
                </div>
                <div class="card expense">
                    <div class="card-header">
                        <div class="card-icon expense">💸</div>
                        <h3>Total Expenses</h3>
                    </div>
                    <div class="amount negative">$${expenses.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
                    <div class="sub-text">All categories</div>
                </div>
                <div class="card balance">
                    <div class="card-header">
                        <div class="card-icon balance">📊</div>
                        <h3>Net Balance</h3>
                    </div>
                    <div class="amount ${balance >= 0 ? 'positive' : 'negative'}">$${balance.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
                    <div class="sub-text">${balance >= 0 ? 'Surplus!' : 'Deficit'}</div>
                </div>
                <div class="card savings">
                    <div class="card-header">
                        <div class="card-icon savings">🐷</div>
                        <h3>Monthly Savings</h3>
                    </div>
                    <div class="amount neutral">$${savings.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
                    <div class="sub-text">대혀니 + 하니</div>
                </div>
            `;
            document.getElementById('summaryCards').innerHTML = html;
        }

        function updateTrendChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const months = ['Sep', 'Oct', 'Nov', 'Dec', 'Jan'];
            const incomeData = [4153, 5300, 4333.87, 5461.22, 9069.99];
            const expenseData = [5369.42, 4405.71, 3426.90, 6555.99, 7630.49];

            if (trendChart) trendChart.destroy();

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: months,
                    datasets: [{
                        label: 'Income',
                        data: incomeData,
                        borderColor: '#56ab2f',
                        backgroundColor: 'rgba(86, 171, 47, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3
                    }, {
                        label: 'Expenses',
                        data: expenseData,
                        borderColor: '#ff6b6b',
                        backgroundColor: 'rgba(255, 107, 107, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#5a4a42', font: { family: 'Nunito' } } }
                    },
                    scales: {
                        y: { ticks: { color: '#8b7355' }, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { ticks: { color: '#8b7355' }, grid: { color: 'rgba(0,0,0,0.05)' } }
                    }
                }
            });
        }

        function updateCategoryChart(monthData) {
            const ctx = document.getElementById('categoryChart').getContext('2d');

            const categories = [];
            const values = [];
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00d2d3', '#ff9f43', '#10ac84', '#636e72'];

            if (monthData.expenses) {
                const exp = monthData.expenses;
                if (exp.housing?.sum) { categories.push('Housing'); values.push(exp.housing.sum); }
                if (exp.tithing?.sum) { categories.push('Tithing'); values.push(exp.tithing.sum); }
                if (exp.utilities?.sum) { categories.push('Utilities'); values.push(exp.utilities.sum); }
                if (exp.insurance?.sum) { categories.push('Insurance'); values.push(exp.insurance.sum); }
                if (exp.pet?.sum) { categories.push('Pet (Namong)'); values.push(exp.pet.sum); }
                if (exp.grocery?.sum) { categories.push('Grocery'); values.push(exp.grocery.sum); }
                if (exp.entertainment?.sum) { categories.push('Entertainment'); values.push(exp.entertainment.sum); }
                if (exp.dining?.sum) { categories.push('Dining'); values.push(exp.dining.sum); }
                if (exp.gas?.sum) { categories.push('Gas'); values.push(exp.gas.sum); }
                if (exp.membership?.sum) { categories.push('Membership'); values.push(exp.membership.sum); }
                if (exp.shopping?.sum) { categories.push('Shopping'); values.push(exp.shopping.sum); }
                if (exp.travel?.sum) { categories.push('Travel'); values.push(exp.travel.sum); }
                if (exp.giving?.sum) { categories.push('Giving'); values.push(exp.giving.sum); }
                if (exp.other?.sum) { categories.push('Other'); values.push(exp.other.sum); }
            }

            if (categoryChart) categoryChart.destroy();

            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: categories,
                    datasets: [{
                        data: values,
                        backgroundColor: colors.slice(0, categories.length),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: { color: '#5a4a42', padding: 8, font: { family: 'Nunito', size: 11 } }
                        }
                    }
                }
            });
        }

        function updateExpenseBarChart() {
            const ctx = document.getElementById('expenseBarChart').getContext('2d');
            const months = ['Sep', 'Oct', 'Nov', 'Dec', 'Jan'];

            if (expenseBarChart) expenseBarChart.destroy();

            expenseBarChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: months,
                    datasets: [
                        { label: 'Housing', data: [3200, 3200, 1200, 3200, 3362.80], backgroundColor: '#ff6b6b' },
                        { label: 'Utilities', data: [272, 220, 0, 180, 255.99], backgroundColor: '#48dbfb' },
                        { label: 'Insurance', data: [140, 140, 0, 140, 1487.93], backgroundColor: '#ff9ff3' },
                        { label: 'Other', data: [1757.42, 845.71, 2226.90, 3035.99, 2489.59], backgroundColor: '#feca57' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#5a4a42', font: { family: 'Nunito' } } } },
                    scales: {
                        y: { stacked: true, ticks: { color: '#8b7355' }, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { stacked: true, ticks: { color: '#8b7355' }, grid: { color: 'rgba(0,0,0,0.05)' } }
                    }
                }
            });
        }

        function updateSavingsChart() {
            const ctx = document.getElementById('savingsChart').getContext('2d');

            if (savingsChart) savingsChart.destroy();

            savingsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: savingsGoals.map(g => g.name),
                    datasets: [{
                        label: 'Target',
                        data: savingsGoals.map(g => g.targetNum),
                        backgroundColor: ['#ff9ff3', '#48dbfb', '#54a0ff', '#5f27cd']
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#8b7355' }, grid: { color: 'rgba(0,0,0,0.05)' } },
                        y: { ticks: { color: '#8b7355' }, grid: { color: 'rgba(0,0,0,0.05)' } }
                    }
                }
            });
        }

        function updateInsights(monthData) {
            const income = monthData.income?.total || 0;
            const expenses = monthData.totalExpenses || 0;
            const balance = income - expenses;
            const savings = monthData.savings?.total || 0;

            const insights = [];

            if (balance > 0) {
                insights.push({
                    icon: '🎉', type: 'good',
                    title: 'Great Job!',
                    text: `You have $${balance.toFixed(2)} surplus this month! Consider adding more to savings.`
                });
            } else {
                insights.push({
                    icon: '⚠️', type: 'warning',
                    title: 'Budget Alert',
                    text: `Expenses exceeded income by $${Math.abs(balance).toFixed(2)}. Review spending categories.`
                });
            }

            if (monthData.expenses?.housing?.sum > 3000) {
                insights.push({
                    icon: '🏠', type: 'info',
                    title: 'Housing Costs',
                    text: `Housing is $${monthData.expenses.housing.sum.toFixed(2)}. Remember: $1,200 is Seonhan rent that Haeun pays for her brother!`
                });
            }

            if (monthData.expenses?.pet?.sum > 0) {
                insights.push({
                    icon: '🐱', type: 'cat',
                    title: 'Namong Care',
                    text: `Pet expenses: $${monthData.expenses.pet.sum.toFixed(2)}. Your fluffy friend is well taken care of!`
                });
            }

            if (savings >= 2000) {
                insights.push({
                    icon: '💪', type: 'good',
                    title: 'Excellent Savings!',
                    text: `$${savings.toFixed(2)} saved this month! At this rate, you'll reach your car goal in ${Math.ceil(26000/savings)} months.`
                });
            }

            if (monthData.expenses?.grocery?.sum > 800) {
                insights.push({
                    icon: '🛒', type: 'tip',
                    title: 'Grocery Spending',
                    text: `Groceries: $${monthData.expenses.grocery.sum.toFixed(2)}. Includes Costco bulk purchases - great for savings!`
                });
            }

            if (monthData.expenses?.entertainment?.sum > 0) {
                insights.push({
                    icon: '🎭', type: 'info',
                    title: 'Entertainment',
                    text: `Entertainment spending: $${monthData.expenses.entertainment.sum.toFixed(2)}. Balance work and play!`
                });
            }

            const html = insights.map(i => `
                <div class="insight-item">
                    <div class="insight-icon ${i.type}">${i.icon}</div>
                    <div class="insight-content">
                        <h4>${i.title}</h4>
                        <p>${i.text}</p>
                    </div>
                </div>
            `).join('');

            document.getElementById('insightsContainer').innerHTML = html;
        }

        function updateExpenseTable(monthData) {
            if (!monthData.expenses) return;

            const categories = [
                { key: 'housing', name: 'Housing', badge: 'housing', desc: 'Rent + Seonhan Rent (for brother)' },
                { key: 'tithing', name: 'Tithing', badge: 'giving', desc: '십일조 - Religious offering' },
                { key: 'utilities', name: 'Utilities', badge: 'utilities', desc: 'Gfiber, GP, AT&T' },
                { key: 'insurance', name: 'Insurance', badge: 'insurance', desc: 'Geico, Namong, Health' },
                { key: 'pet', name: 'Pet (Namong)', badge: 'pet', desc: 'Cat food & supplies' },
                { key: 'grocery', name: 'Grocery', badge: 'food', desc: 'Publix, Megamart, Costco' },
                { key: 'entertainment', name: 'Entertainment', badge: 'entertainment', desc: 'Harry Potter, Netflix, Pottery' },
                { key: 'dining', name: 'Dining', badge: 'food', desc: 'Restaurants & takeout' },
                { key: 'gas', name: 'Gas', badge: 'transport', desc: 'Gasoline' },
                { key: 'membership', name: 'Membership', badge: 'other', desc: 'Costco membership' },
                { key: 'shopping', name: 'Shopping', badge: 'other', desc: 'Amazon, etc.' },
                { key: 'travel', name: 'Travel', badge: 'other', desc: 'Portland trip' },
                { key: 'giving', name: 'Giving', badge: 'giving', desc: 'Mother money' },
                { key: 'other', name: 'Other', badge: 'other', desc: 'Miscellaneous' }
            ];

            const total = monthData.totalExpenses || 1;
            let html = '';

            categories.forEach(cat => {
                if (monthData.expenses[cat.key]?.sum > 0) {
                    const amount = monthData.expenses[cat.key].sum;
                    const percent = ((amount / total) * 100).toFixed(1);
                    html += `
                        <tr>
                            <td><span class="category-badge ${cat.badge}">${cat.name}</span></td>
                            <td>${cat.desc}</td>
                            <td>$${amount.toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                            <td>
                                ${percent}%
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${percent}%;"></div>
                                </div>
                            </td>
                        </tr>
                    `;
                }
            });

            document.getElementById('expenseTableBody').innerHTML = html;
        }

        function updateSavingsGoals() {
            const html = savingsGoals.map(goal => `
                <div class="goal-item">
                    <div class="goal-info">
                        <h4>${goal.name}</h4>
                        <p>${goal.nameKo}</p>
                    </div>
                    <div class="goal-amount">
                        <div class="target">${goal.target}</div>
                    </div>
                </div>
            `).join('') + `
                <div class="goal-item" style="background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);">
                    <div class="goal-info">
                        <h4>TOTAL GOAL</h4>
                        <p>총 저축 목표</p>
                    </div>
                    <div class="goal-amount">
                        <div class="target">$36,600+</div>
                    </div>
                </div>
            `;

            document.getElementById('savingsGoalsContainer').innerHTML = html;
        }

        function selectMonth(month) {
            currentMonth = month;
            document.querySelectorAll('.month-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const monthData = budgetData[month];
            updateSummaryCards(monthData);
            updateCategoryChart(monthData);
            updateInsights(monthData);
            updateExpenseTable(monthData);
        }

        function init() {
            updateSummaryCards(budgetData.jan);
            updateTrendChart();
            updateCategoryChart(budgetData.jan);
            updateExpenseBarChart();
            updateSavingsChart();
            updateInsights(budgetData.jan);
            updateExpenseTable(budgetData.jan);
            updateSavingsGoals();
        }

        init();
    </script>
</body>
</html>
